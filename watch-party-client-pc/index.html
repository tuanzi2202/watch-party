<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>专属放映室 (桌面版)</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body, html { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden; }
    
    /* 播放器界面 UI */
    #ui { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 20px; z-index: 9999; font-family: sans-serif; font-weight: bold; pointer-events: none; display: none; }
    iframe { width: 100%; height: 100%; border: none; display: none; }
    
    /* 新增：IP 配置界面样式 */
    #setup-dialog { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; color: white; font-family: sans-serif; }
    #setup-dialog h2 { margin-bottom: 30px; }
    #setup-dialog input { padding: 15px; font-size: 16px; border-radius: 8px; border: none; margin-bottom: 20px; width: 300px; text-align: center; background: #222; color: #fff; }
    #setup-dialog button { padding: 12px 40px; font-size: 16px; border-radius: 8px; border: none; background: #fb7299; color: white; cursor: pointer; font-weight: bold; transition: background 0.3s; }
    #setup-dialog button:hover { background: #e0658a; }
  </style>
</head>
<body>
  
  <div id="setup-dialog">
    <h2>⚙️ 专属放映室配置</h2>
    <input type="text" id="ip-input" placeholder="例如: 服务器IP:3000">
    <button onclick="saveAndConnect()">保存并连接</button>
  </div>

  <div id="ui">🎬 状态: <span id="status" style="color: #ffcc00;">连接中...</span></div>
  <iframe id="bili" src="https://player.bilibili.com/player.html?bvid=BV1LSXDBiEGG&high_quality=1&isOutside=true"></iframe>

  <script>
    const setupDialog = document.getElementById('setup-dialog');
    const uiEl = document.getElementById('ui');
    const biliIframe = document.getElementById('bili');
    const ipInput = document.getElementById('ip-input');
    const statusEl = document.getElementById('status');
    let socket;

    // 页面启动时读取上次缓存的 IP
    window.onload = () => {
      const savedIp = localStorage.getItem('watchPartyServerIp');
      if (savedIp) {
        ipInput.value = savedIp;
      }
    };

    // 用户点击连接按钮
    function saveAndConnect() {
      let ip = ipInput.value.trim();
      if (!ip) return alert('请输入服务器 IP！');
      
      // 自动修正协议前缀
      if (!ip.startsWith('ws://') && !ip.startsWith('wss://') && !ip.startsWith('http://')) {
          ip = 'ws://' + ip;
      }

      // 缓存用户的原始输入
      localStorage.setItem('watchPartyServerIp', ipInput.value.trim()); 
      
      // 切换 UI
      setupDialog.style.display = 'none';
      uiEl.style.display = 'block';
      biliIframe.style.display = 'block';

      initNetwork(ip);
    }

    // 初始化网络与播放器通信
    function initNetwork(serverUrl) {
      socket = io(serverUrl, { transports: ['websocket'] });
      
      socket.on('connect', () => { statusEl.innerText = '🟢 已连接好友'; statusEl.style.color = '#4CD964'; });
      socket.on('disconnect', () => { statusEl.innerText = '🔴 已断开'; statusEl.style.color = '#FF3B30'; });
      socket.on('connect_error', () => { statusEl.innerText = '❌ 连接失败，请刷新修改IP'; statusEl.style.color = '#FF3B30'; });

      biliIframe.onload = function() {
        const iframeDoc = this.contentDocument || this.contentWindow.document;
        
        socket.on('sync_receive', (data) => {
          const video = iframeDoc.querySelector('video');
          if(!video) return;
          if (Math.abs(video.currentTime - data.time) > 1) video.currentTime = data.time;
          if (data.state === 'playing' && video.paused) video.play();
          else if (data.state === 'paused' && !video.paused) video.pause();
        });

        setInterval(() => {
          const video = iframeDoc.querySelector('video');
          if(video) {
            socket.emit('sync_send', { time: video.currentTime, state: video.paused ? 'paused' : 'playing' });
          }
        }, 1000);
      };
    }
  </script>
</body>
</html>
