<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>专属放映室 (桌面版)</title>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  
  <style>
    :root {
      --bili-pink: #fb7299; --bili-pink-hover: #ff85a8;
      --glass-bg: rgba(25, 25, 30, 0.6); --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f1f1f1; --text-sub: #a0a0b0;
    }
    body, html { 
      margin: 0; padding: 0; height: 100%; overflow: hidden; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000; color: var(--text-main); user-select: none;
    }

    /* ==========================================
       🎮 PSV 风格主菜单视图
       ========================================== */
    #main-menu {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      background: #0a0a1a; display: flex; flex-direction: column; 
      justify-content: center; align-items: center; z-index: 20000; transition: opacity 0.5s ease;
    }
    @keyframes breath {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .bg-wave1 {
      position: absolute; width: 800px; height: 800px; border-radius: 50%;
      background: rgba(0, 150, 255, 0.15); top: -200px; left: -200px;
      animation: breath 8s infinite ease-in-out; pointer-events: none;
    }
    .bg-wave2 {
      position: absolute; width: 600px; height: 600px; border-radius: 50%;
      background: rgba(150, 0, 255, 0.1); bottom: -150px; right: -150px;
      animation: breath 8s infinite ease-in-out reverse; pointer-events: none;
    }
    .menu-header {
      position: absolute; top: 30px; width: calc(100% - 60px); 
      display: flex; justify-content: space-between; align-items: center; z-index: 10;
    }
    .menu-time { font-size: 18px; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
    .menu-icons { display: flex; gap: 10px; font-size: 20px; }
    
    .bubble-grid {
      display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; z-index: 10; width: 80%;
    }
    .bubble-container {
      display: flex; flex-direction: column; align-items: center; cursor: pointer;
      transition: transform 0.2s; width: 100px;
    }
    .bubble-container:hover { transform: scale(1.1); }
    .bubble {
      width: 86px; height: 86px; border-radius: 43px; display: flex; justify-content: center; align-items: center;
      border: 1.5px solid rgba(255,255,255,0.4); box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-size: 42px; color: white;
    }
    .bubble-text { margin-top: 12px; font-size: 14px; font-weight: 600; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }

    /* ==========================================
       🎬 放映室视图配置 (彻底弃用 display: none)
       ========================================== */
    #watch-party-app { 
      visibility: hidden; opacity: 0; pointer-events: none; 
      width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; 
      z-index: 100; transition: opacity 0.5s ease;
    }
    /* ⚠️ 强效激活类：覆盖一切可能残留的隐藏属性 */
    .app-active {
      visibility: visible !important; opacity: 1 !important; pointer-events: auto !important;
    }
    
    webview { 
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
      border: none; opacity: 0; pointer-events: none; z-index: -1; 
      transition: opacity 0.8s ease-out; 
    }
    .webview-active { opacity: 1; pointer-events: auto; z-index: 1; }
    
    #setup-dialog { 
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
      display: flex; flex-direction: column; justify-content: center; align-items: center; 
      z-index: 10000; background: #111; transition: opacity 0.5s ease;
    }
    .back-btn {
      position: absolute; top: 30px; left: 30px; font-size: 32px; color: white; cursor: pointer;
      transition: transform 0.2s;
    }
    .back-btn:hover { transform: scale(1.1); }

    .setup-card {
      background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
      border-radius: 24px; padding: 40px 50px; text-align: center;
    }
    .setup-card h2 { margin: 0 0 10px 0; font-size: 24px; }
    .setup-card input { 
      width: 280px; padding: 14px 20px; font-size: 15px; border-radius: 12px; border: 1px solid var(--glass-border); 
      background: rgba(0, 0, 0, 0.3); color: #fff; text-align: center; margin-bottom: 25px; outline: none;
    }
    .setup-card button { 
      width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--bili-pink); 
      color: white; cursor: pointer; font-weight: 600; font-size: 16px;
    }

    #ui { 
      position: fixed; top: 25px; left: 25px; background: var(--glass-bg); backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 30px; 
      z-index: 9999; font-size: 14px; opacity: 0; transition: opacity 0.5s;
      display: flex; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ffcc00; margin-right: 6px; }

    #danmaku-container {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none; overflow: hidden; z-index: 8000;
    }
    .danmaku-item {
      position: absolute; white-space: nowrap; color: #fff; font-size: 24px; font-weight: bold;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.8), -1px -1px 3px rgba(0,0,0,0.8);
      will-change: transform; animation: danmakuSlide 6s linear forwards;
    }
    @keyframes danmakuSlide {
      from { transform: translateX(100vw); }
      to { transform: translateX(-100%); }
    }

    #chat-bar {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border);
      padding: 10px; border-radius: 30px; display: flex; gap: 10px; z-index: 9999;
      opacity: 0; pointer-events: none; transition: opacity 0.5s; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    #chat-bar.active { opacity: 1; pointer-events: auto; }
    #chat-bar input {
      background: transparent; border: none; color: white; width: 300px; outline: none; padding: 0 15px; font-size: 15px;
    }
    #chat-bar button {
      background: #00aeec; border: none; border-radius: 20px; color: white; padding: 8px 20px; cursor: pointer; font-weight: bold;
    }
  </style>
</head>
<body>

  <div id="main-menu">
    <div class="bg-wave1"></div>
    <div class="bg-wave2"></div>
    
    <div class="menu-header">
      <div class="menu-time" id="clock">10:04 AM</div>
      <div class="menu-icons">
        <ion-icon name="wifi"></ion-icon>
        <ion-icon name="battery-full"></ion-icon>
      </div>
    </div>

    <div class="bubble-grid">
      <div class="bubble-container" onclick="openApp('watch-party', false)">
        <div class="bubble" style="background-color: rgba(251, 114, 153, 0.7);"><ion-icon name="videocam"></ion-icon></div>
        <div class="bubble-text">专属放映室</div>
      </div>
      <div class="bubble-container" onclick="openApp('watch-party', true)">
        <div class="bubble" style="background-color: rgba(255, 165, 0, 0.7);"><ion-icon name="shuffle"></ion-icon></div>
        <div class="bubble-text">随机盲盒</div>
      </div>
      <div class="bubble-container" onclick="alert('开源游戏库构建中...')">
        <div class="bubble" style="background-color: rgba(0, 200, 255, 0.7);"><ion-icon name="game-controller"></ion-icon></div>
        <div class="bubble-text">开源游戏库</div>
      </div>
      <div class="bubble-container" onclick="alert('JoJo 宇宙图鉴整理中...')">
        <div class="bubble" style="background-color: rgba(150, 50, 255, 0.7);"><ion-icon name="book"></ion-icon></div>
        <div class="bubble-text">JoJo 设定集</div>
      </div>
    </div>
  </div>

  <div id="watch-party-app">
    <div id="setup-dialog">
      <ion-icon name="arrow-back-circle" class="back-btn" onclick="returnToMenu()"></ion-icon>
      <div class="setup-card">
        <h2 id="setup-title">专属放映室</h2>
        <input type="text" id="ip-input" placeholder="请输入信令服务器 IP">
        <input type="text" id="room-input" placeholder="请输入房间口令 (如: 520)" style="margin-top: -10px;">
        <button onclick="saveAndConnect()">建立连接</button>
      </div>
    </div>

    <div id="ui">
      <ion-icon name="close-circle" style="font-size:24px; margin-right:8px; cursor:pointer;" onclick="returnToMenu()"></ion-icon>
      <div id="status-dot" class="status-dot"></div>
      <span id="status" style="margin-right: 15px;">正在准备连接...</span>
      
      <input type="text" id="pc-bvid-input" placeholder="输入BV号换片" style="background:rgba(255,255,255,0.2); border:none; color:#fff; border-radius:12px; padding:6px 12px; outline:none; width: 130px;">
      <button id="pc-change-btn" onclick="changeVideoPC()" style="background:#fb7299; border:none; color:white; border-radius:12px; cursor:pointer; padding:6px 12px; margin-left:8px; font-weight:bold;">换片</button>
      <button id="pc-random-btn" onclick="playRandomPC()" style="background:#ff9800; border:none; color:white; border-radius:12px; cursor:pointer; padding:6px 10px; margin-left:8px; display:flex; align-items:center; justify-content:center;"><ion-icon name="dice" style="font-size:18px; margin-right:4px;"></ion-icon> 抽卡</button>
    </div>
    
    <div id="danmaku-container"></div>
    
    <div id="chat-bar">
      <input type="text" id="chat-input" placeholder="发个弹幕吐槽一下..." onkeydown="if(event.key==='Enter') sendChat()">
      <button onclick="sendChat()">发送</button>
    </div>
    
    <webview id="bili"></webview>
  </div>

  <script>
    // --- 全局句柄与状态管控 ---
    let socket;
    let syncIntervalId = null; 
    let consoleMessageHandler = null; 
    let isAutoRandom = false;

    // --- 盲盒资源池 ---
    const RANDOM_POOL = [
      'BV1LSXDBiEGG', 'BV1GJ411x7h7', 'BV1xx411c7mD', 'BV17x411w7KC', 
      'BV1qM4y1w716', 'BV1aA4y1I7vL', 'BV1Q54y1y7eA'
    ];

    // --- DOM 节点获取 ---
    const mainMenu = document.getElementById('main-menu');
    const wpApp = document.getElementById('watch-party-app');
    const setupDialog = document.getElementById('setup-dialog');
    const uiEl = document.getElementById('ui');
    const chatBar = document.getElementById('chat-bar');
    const biliWebview = document.getElementById('bili');
    const ipInput = document.getElementById('ip-input');
    const roomInput = document.getElementById('room-input');
    const statusEl = document.getElementById('status');
    const statusDot = document.getElementById('status-dot');
    const setupTitle = document.getElementById('setup-title');

    // --- 时钟更新 ---
    setInterval(() => {
      const now = new Date();
      let hours = now.getHours();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      const minutes = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('clock').innerText = `${hours}:${minutes} ${ampm}`;
    }, 1000);

    function updateStatus(text, color) { statusEl.innerText = text; statusDot.style.background = color; }

    window.onload = () => { 
      if (localStorage.getItem('watchPartyServerIp')) ipInput.value = localStorage.getItem('watchPartyServerIp'); 
      if (localStorage.getItem('watchPartyRoomId')) roomInput.value = localStorage.getItem('watchPartyRoomId'); 
    };

    // --- 路由与生命周期管理 (基于透明度而非 display) ---
    function openApp(appId, randomFlag) {
      if (appId === 'watch-party') {
        isAutoRandom = randomFlag;
        setupTitle.innerText = randomFlag ? '准备开启盲盒' : '专属放映室';
        
        // ⚠️ 核心修复：根据入口参数，在进入放映室前提前裁切掉不属于该模式的 UI 控件
        document.getElementById('pc-bvid-input').style.display = randomFlag ? 'none' : 'block';
        document.getElementById('pc-change-btn').style.display = randomFlag ? 'none' : 'block';
        document.getElementById('pc-random-btn').style.display = randomFlag ? 'flex' : 'none';
        
        mainMenu.style.opacity = '0';
        mainMenu.style.pointerEvents = 'none';
        
        setTimeout(() => {
          wpApp.classList.add('app-active');
          setupDialog.style.display = 'flex';
          setupDialog.style.opacity = '1';
          setupDialog.style.pointerEvents = 'auto';
        }, 500);
      }
    }

    function returnToMenu() {
      if (socket) { socket.disconnect(); socket = null; }
      if (syncIntervalId) { clearInterval(syncIntervalId); syncIntervalId = null; }
      if (consoleMessageHandler) {
        biliWebview.removeEventListener('console-message', consoleMessageHandler);
        consoleMessageHandler = null;
      }

      biliWebview.classList.remove('webview-active');
      biliWebview.src = 'about:blank'; 
      
      uiEl.style.opacity = '0';
      chatBar.classList.remove('active');
      
      wpApp.classList.remove('app-active');
      mainMenu.style.pointerEvents = 'auto';
      setTimeout(() => mainMenu.style.opacity = '1', 50);
    }

    let pcUiVisible = true;
    function togglePCUI() {
      pcUiVisible = !pcUiVisible;
      uiEl.style.opacity = pcUiVisible ? '1' : '0';
      uiEl.style.pointerEvents = pcUiVisible ? 'auto' : 'none'; 
      chatBar.style.opacity = pcUiVisible ? '1' : '0';
      chatBar.style.pointerEvents = pcUiVisible ? 'auto' : 'none'; 
    }

    function saveAndConnect() {
      let ip = ipInput.value.trim();
      let roomId = roomInput.value.trim() || 'public_hall';
      if (!ip) return;
      if (!ip.startsWith('ws://') && !ip.startsWith('wss://') && !ip.startsWith('http://')) ip = 'ws://' + ip;
      
      localStorage.setItem('watchPartyServerIp', ip); 
      localStorage.setItem('watchPartyRoomId', roomId); 
      
      setupDialog.style.opacity = '0'; setupDialog.style.pointerEvents = 'none';
      setTimeout(() => {
        setupDialog.style.display = 'none';
        uiEl.style.opacity = '1'; uiEl.style.pointerEvents = 'auto';
        chatBar.classList.add('active');
        biliWebview.classList.add('webview-active');
        
        const targetBvid = isAutoRandom ? RANDOM_POOL[Math.floor(Math.random() * RANDOM_POOL.length)] : 'BV1LSXDBiEGG';
        biliWebview.src = `https://player.bilibili.com/player.html?bvid=${targetBvid}&high_quality=1&isOutside=true`;
        
        initNetwork(ip, roomId);
      }, 500); 
    }

    function changeVideoPC() {
      const bvid = document.getElementById('pc-bvid-input').value.trim();
      if (bvid && socket) {
        socket.emit('change_video', { bvid: bvid });
        document.getElementById('pc-bvid-input').value = '';
      }
    }

    function playRandomPC() {
      const randomId = RANDOM_POOL[Math.floor(Math.random() * RANDOM_POOL.length)];
      if (socket) socket.emit('change_video', { bvid: randomId });
    }

    function shootDanmaku(text) {
      const container = document.getElementById('danmaku-container');
      const el = document.createElement('div');
      el.className = 'danmaku-item';
      el.innerText = text;
      el.style.top = Math.random() * 60 + 10 + '%'; 
      container.appendChild(el);
      setTimeout(() => el.remove(), 6000);
    }

    function sendChat() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if(text && socket) {
        socket.emit('send_chat', { text: text });
        input.value = '';
      }
    }

    function initNetwork(serverUrl, roomId) {
      socket = io(serverUrl, { transports: ['websocket'] });
      
      socket.on('connect', () => { 
        socket.emit('join_room', roomId);
        updateStatus(`已加入包厢: ${roomId}`, '#00e676'); 
        
        if (isAutoRandom) {
          const currentBvid = new URL(biliWebview.src).searchParams.get('bvid');
          if (currentBvid) socket.emit('change_video', { bvid: currentBvid });
        }
      });
      
      consoleMessageHandler = (e) => {
        if (e.message === 'TOGGLE_UI_PC') { togglePCUI(); } 
        else if (e.message.startsWith('【探针')) { console.log(e.message); }
      };
      biliWebview.addEventListener('console-message', consoleMessageHandler);

      let isRemoteSyncing = false;
      let lastTime = 0; let lastState = 'paused';

      socket.on('receive_danmaku', (data) => shootDanmaku(data.text));

      socket.on('change_video', (data) => {
        updateStatus('正在换片...', '#00aeec');
        biliWebview.src = `https://player.bilibili.com/player.html?bvid=${data.bvid}&high_quality=1&isOutside=true`;
        lastTime = 0; isRemoteSyncing = false;
        setTimeout(() => updateStatus(`已加入包厢: ${roomId}`, '#00e676'), 2000);
      });

      socket.on('sync_receive', (data) => {
        isRemoteSyncing = true;
        biliWebview.executeJavaScript(`
          (function() {
            var video = document.querySelector('video');
            if (!video) return;
            if (Math.abs(video.currentTime - ${data.time}) > 1.5) video.currentTime = ${data.time};
            if ('${data.state}' === 'playing' && video.paused) video.play().catch(function(){});
            else if ('${data.state}' === 'paused' && !video.paused) video.pause();
          })();
        `);
        setTimeout(() => { isRemoteSyncing = false; }, 1000);
      });

      syncIntervalId = setInterval(() => {
        if (!socket || isRemoteSyncing) return; 
        
        biliWebview.executeJavaScript(`
          (function() {
            if (window.__interaction_injected) return;
            window.__interaction_injected = true;
            var tapTimer = null; var lastTap = 0;
            window.addEventListener('click', function(e) {
              if (e.clientY > window.innerHeight - 90) return; 
              e.stopPropagation(); 
              var now = Date.now();
              if (now - lastTap < 300) {
                 clearTimeout(tapTimer);
                 var video = document.querySelector('video');
                 if (video) { video.paused ? video.play() : video.pause(); }
              } else {
                 tapTimer = setTimeout(function() { console.log('TOGGLE_UI_PC'); }, 300);
              }
              lastTap = now;
            }, true);
          })();
        `).catch(() => {});

        biliWebview.executeJavaScript(`
          (function() { var v = document.querySelector('video'); return v ? { time: v.currentTime, paused: v.paused } : null; })();
        `).then((result) => {
          if (!result) return;
          const isSeeking = (Math.abs(result.time - lastTime) > 2 && !result.paused) || (Math.abs(result.time - lastTime) > 0.5 && result.paused);
          const isStateChanged = (result.paused ? 'paused' : 'playing') !== lastState;
          if (isSeeking || isStateChanged) socket.emit('sync_send', { time: result.time, state: result.paused ? 'paused' : 'playing' });
          lastTime = result.time; lastState = result.paused ? 'paused' : 'playing';
        }).catch(() => {});
      }, 500);
    }
  </script>
</body>
</html>
