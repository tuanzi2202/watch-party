<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>专属放映室 (桌面版)</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    :root {
      --bili-pink: #fb7299; --bili-pink-hover: #ff85a8;
      --glass-bg: rgba(25, 25, 30, 0.6); --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f1f1f1; --text-sub: #a0a0b0;
    }
    body, html { 
      margin: 0; padding: 0; height: 100%; overflow: hidden; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000; color: var(--text-main);
    }
    
    webview { 
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
      border: none; opacity: 0; pointer-events: none; z-index: -1; 
      transition: opacity 0.8s ease-out; 
    }
    .webview-active { opacity: 1; pointer-events: auto; z-index: 1; }
    
    #setup-dialog { 
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
      display: flex; flex-direction: column; justify-content: center; align-items: center; 
      z-index: 10000; background: #111; transition: opacity 0.5s ease;
    }
    .setup-card {
      background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
      border-radius: 24px; padding: 40px 50px; text-align: center;
    }
    .setup-card h2 { margin: 0 0 10px 0; font-size: 24px; }
    .setup-card input { 
      width: 280px; padding: 14px 20px; font-size: 15px; border-radius: 12px; border: 1px solid var(--glass-border); 
      background: rgba(0, 0, 0, 0.3); color: #fff; text-align: center; margin-bottom: 25px; outline: none;
    }
    .setup-card button { 
      width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--bili-pink); 
      color: white; cursor: pointer; font-weight: 600;
    }

    #ui { 
      position: fixed; top: 25px; left: 25px; background: var(--glass-bg); backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 30px; 
      z-index: 9999; font-size: 14px; pointer-events: none; opacity: 0;
      display: flex; align-items: center; gap: 8px; transition: opacity 0.5s;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ffcc00; }

    /* ⚠️ 新增：全屏弹幕轨道层 */
    #danmaku-container {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none; /* 必须设置穿透，否则无法点击视频 */
      overflow: hidden; z-index: 8000;
    }
    
    /* ⚠️ 新增：单条弹幕的样式与硬件加速动画 */
    .danmaku-item {
      position: absolute; white-space: nowrap; color: #fff; font-size: 24px; font-weight: bold;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.8), -1px -1px 3px rgba(0,0,0,0.8);
      will-change: transform; /* 开启 GPU 硬件加速 */
      animation: danmakuSlide 6s linear forwards;
    }
    @keyframes danmakuSlide {
      from { transform: translateX(100vw); }
      to { transform: translateX(-100%); }
    }

    /* ⚠️ 新增：PC 端底部的弹幕发送栏 */
    #chat-bar {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border);
      padding: 10px; border-radius: 30px; display: flex; gap: 10px; z-index: 9999;
      opacity: 0; pointer-events: none; transition: opacity 0.5s; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    #chat-bar.active { opacity: 1; pointer-events: auto; }
    #chat-bar input {
      background: transparent; border: none; color: white; width: 300px; outline: none; padding: 0 15px; font-size: 15px;
    }
    #chat-bar button {
      background: #00aeec; border: none; border-radius: 20px; color: white; padding: 8px 20px; cursor: pointer; font-weight: bold;
    }
  </style>
</head>
<body>
  
  <div id="setup-dialog">
    <div class="setup-card">
      <h2>专属放映室</h2>
      <input type="text" id="ip-input" placeholder="请输入信令服务器 IP">
      <button onclick="saveAndConnect()">建立连接</button>
    </div>
  </div>

  <div id="ui"><div id="status-dot" class="status-dot"></div><span id="status">正在准备连接...</span></div>
  
  <div id="danmaku-container"></div>
  
  <div id="chat-bar">
    <input type="text" id="chat-input" placeholder="发个弹幕吐槽一下..." onkeydown="if(event.key==='Enter') sendChat()">
    <button onclick="sendChat()">发送</button>
  </div>
  
  <webview id="bili" src="https://player.bilibili.com/player.html?bvid=BV1LSXDBiEGG&high_quality=1&isOutside=true"></webview>

  <script>
    const setupDialog = document.getElementById('setup-dialog');
    const uiEl = document.getElementById('ui');
    const chatBar = document.getElementById('chat-bar');
    const biliWebview = document.getElementById('bili');
    const ipInput = document.getElementById('ip-input');
    const statusEl = document.getElementById('status');
    const statusDot = document.getElementById('status-dot');
    let socket;

    function updateStatus(text, color) { statusEl.innerText = text; statusDot.style.background = color; }

    window.onload = () => { if (localStorage.getItem('watchPartyServerIp')) ipInput.value = localStorage.getItem('watchPartyServerIp'); };

    function saveAndConnect() {
      let ip = ipInput.value.trim();
      if (!ip) return;
      if (!ip.startsWith('ws://') && !ip.startsWith('wss://') && !ip.startsWith('http://')) ip = 'ws://' + ip;
      localStorage.setItem('watchPartyServerIp', ipInput.value.trim()); 
      
      setupDialog.style.opacity = '0'; setupDialog.style.pointerEvents = 'none';
      setTimeout(() => {
        setupDialog.style.display = 'none';
        uiEl.style.opacity = '1'; chatBar.classList.add('active');
        biliWebview.classList.add('webview-active');
        initNetwork(ip);
      }, 500); 
    }

    // ⚠️ 新增：生成弹幕并挂载到屏幕，动画结束后自动销毁防内存泄漏
    function shootDanmaku(text) {
      const container = document.getElementById('danmaku-container');
      const el = document.createElement('div');
      el.className = 'danmaku-item';
      el.innerText = text;
      // 随机分布在屏幕顶部 10% 到 70% 的高度范围内
      el.style.top = Math.random() * 60 + 10 + '%'; 
      container.appendChild(el);
      // 6秒动画结束后销毁 DOM 节点
      setTimeout(() => el.remove(), 6000);
    }

    // ⚠️ 新增：发送弹幕请求
    function sendChat() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if(text && socket) {
        socket.emit('send_chat', { text: text });
        input.value = '';
      }
    }

    // ⚠️ 新增：PC 端 UI 显示状态寄存器
    let pcUiVisible = true;
    function togglePCUI() {
      pcUiVisible = !pcUiVisible;
      uiEl.style.opacity = pcUiVisible ? '1' : '0';
      chatBar.style.opacity = pcUiVisible ? '1' : '0';
      // 隐藏时彻底禁用输入框的鼠标检测，防止幽灵点击
      chatBar.style.pointerEvents = pcUiVisible ? 'auto' : 'none'; 
    }

    function initNetwork(serverUrl) {
      socket = io(serverUrl, { transports: ['websocket'] });
      
      socket.on('connect', () => { 
        updateStatus('已连接放映室', '#00e676');
        // 废弃原先的定时自动消失逻辑，改为严格受用户点击控制
      });

      // ⚠️ 新增：监听 B 站 Webview 内部传出的伪装信令
      biliWebview.addEventListener('console-message', (e) => {
        if (e.message === 'TOGGLE_UI_PC') {
          togglePCUI();
        } else if (e.message.startsWith('【探针')) {
          console.log(e.message);
        }
      });

      let isRemoteSyncing = false;
      let lastTime = 0; let lastState = 'paused';

      socket.on('receive_danmaku', (data) => { shootDanmaku(data.text); });

      socket.on('change_video', (data) => {
        updateStatus('正在换片...', '#00aeec');
        biliWebview.src = `https://player.bilibili.com/player.html?bvid=${data.bvid}&high_quality=1&isOutside=true`;
        lastTime = 0; isRemoteSyncing = false;
        setTimeout(() => updateStatus('已连接放映室', '#00e676'), 2000);
      });

      socket.on('sync_receive', (data) => {
        isRemoteSyncing = true;
        biliWebview.executeJavaScript(`
          (function() {
            var video = document.querySelector('video');
            if (!video) return;
            if (Math.abs(video.currentTime - ${data.time}) > 1.5) video.currentTime = ${data.time};
            if ('${data.state}' === 'playing' && video.paused) video.play().catch(function(){});
            else if ('${data.state}' === 'paused' && !video.paused) video.pause();
          })();
        `);
        setTimeout(() => { isRemoteSyncing = false; }, 1000);
      });

      setInterval(() => {
        if (isRemoteSyncing) return; 
        
        // ⚠️ 新增：在定时器中持续尝试向 B 站注入交互拦截防线（自带执行锁防止重复注入）
        biliWebview.executeJavaScript(`
          (function() {
            if (window.__interaction_injected) return;
            window.__interaction_injected = true;
            
            var tapTimer = null;
            var lastTap = 0;
            window.addEventListener('click', function(e) {
              if (e.clientY > window.innerHeight - 90) return; // 避开 B 站底部控制栏
              
              e.stopPropagation(); // 切断 B 站原生暂停逻辑
              
              var now = Date.now();
              if (now - lastTap < 300) {
                 clearTimeout(tapTimer);
                 var video = document.querySelector('video');
                 if (video) { video.paused ? video.play() : video.pause(); }
              } else {
                 tapTimer = setTimeout(function() { console.log('TOGGLE_UI_PC'); }, 300);
              }
              lastTap = now;
            }, true);
          })();
        `).catch(() => {});

        biliWebview.executeJavaScript(`
          (function() { var v = document.querySelector('video'); return v ? { time: v.currentTime, paused: v.paused } : null; })();
        `).then((result) => {
          if (!result) return;
          const isSeeking = (Math.abs(result.time - lastTime) > 2 && !result.paused) || (Math.abs(result.time - lastTime) > 0.5 && result.paused);
          const isStateChanged = (result.paused ? 'paused' : 'playing') !== lastState;
          if (isSeeking || isStateChanged) socket.emit('sync_send', { time: result.time, state: result.paused ? 'paused' : 'playing' });
          lastTime = result.time; lastState = result.paused ? 'paused' : 'playing';
        }).catch(() => {});
      }, 500);
    }
  </script>
</body>
</html>
